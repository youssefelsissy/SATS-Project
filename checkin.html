<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - SATS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">

            <a href="index.html" class="logo">
                <img src="../assets/images/logo.svg" alt="SATS Logo" style="height: 40px; margin-right: 10px;">
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html">Register</a>
                <a href="checkin.html" class="active">Check-in</a>
                <a href="history.html">History</a>
                <a href="calendar.html">Calendar</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="card">
                <div class="auth-header">
                    <h2>Class Check-in</h2>
                    <p>Enter the code provided by your instructor.</p>
                </div>

                <div id="checkinMessage" style="margin-bottom: 1rem; display: none;"></div>

                <form id="checkinForm">
                    <div class="form-group">
                        <label for="classCode" class="form-label">Class Code</label>
                        <input type="text" id="classCode" class="form-control" placeholder="e.g. CSE101" required>
                    </div>

                    <div class="form-group">
                        <label for="securityAnswer" class="form-label">Security Question (Optional)</label>
                        <input type="text" id="securityAnswer" class="form-control"
                            placeholder="What is today's lecture topic?">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Submit Attendance</button>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary); text-align: center;">
                        * Ensure you are connected to university Wi-Fi (Simulated)
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 SATS - Faculty of Computer Engineering & Science | New Mansoura University</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/checkin.js"></script>
</body>

</html>
